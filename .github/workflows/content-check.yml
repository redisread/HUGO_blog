name: Content Check

on:
  pull_request:
    branches:
      - master
    paths:
      - 'content/**'

jobs:
  check-content:
    name: Validate Content Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run content check
        run: bash scripts/check-content.sh
